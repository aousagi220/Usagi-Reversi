<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css" />
    <title>Usagi Reversi</title>
  </head>
  <body>
    <div id="wrapper">
      <header id="title">
        <h1 id="titleContent">USAGI REVERSI</h1>
        <p class="header-sub">うさぎリバーシ</p>
      </header>
      <main>
        <div id="game">
          <div id="board"></div>
          <aside id="panel">
            <div class="score-area">
              <div class="score-box">
                <span class="stone-icon black">●</span>
                <span class="score-label">黒</span>
                <span id="black-count" class="score-value">0</span>
              </div>
              <div class="score-box">
                <span class="stone-icon white">●</span>
                <span class="score-label">白</span>
                <span id="white-count" class="score-value">0</span>
              </div>
            </div>
            <div class="turn-area">
              <p class="turn-label">手番</p>
              <span id="current-turn" class="stone-icon black">●</span>
            </div>
            <div class="cpu-settings">
              <p class="cpu-settings-title">CPU設定</p>
              <div class="cpu-row">
                <span class="stone-icon black cpu-player-icon">●</span>
                <label class="toggle">
                  <input type="checkbox" id="black-cpu-toggle" />
                  <span class="toggle-slider"></span>
                </label>
                <span class="cpu-toggle-label">CPU</span>
                <select id="black-cpu-level" class="cpu-level-select" disabled>
                  <option value="0">弱</option>
                  <option value="1">普通</option>
                  <option value="2">強</option>
                </select>
              </div>
              <div class="cpu-row">
                <span class="stone-icon white cpu-player-icon">●</span>
                <label class="toggle">
                  <input type="checkbox" id="white-cpu-toggle" checked />
                  <span class="toggle-slider"></span>
                </label>
                <span class="cpu-toggle-label">CPU</span>
                <select id="white-cpu-level" class="cpu-level-select">
                  <option value="0">弱</option>
                  <option value="1">普通</option>
                  <option value="2">強</option>
                </select>
              </div>
            </div>
            <button id="reset-btn">リセット</button>
          </aside>
        </div>
      </main>
    </div>
    <!-- パストースト -->
    <div id="pass-toast"></div>

    <!-- 勝利モーダル -->
    <div id="result-overlay">
      <div id="result-modal">
        <h2 id="result-title">ゲーム終了</h2>
        <p id="result-message"></p>
        <div class="result-score">
          <div class="result-score-box">
            <span class="stone-icon black">●</span>
            <span class="score-label">黒</span>
            <span id="result-black" class="score-value">0</span>
          </div>
          <div class="result-score-box">
            <span class="stone-icon white">●</span>
            <span class="score-label">白</span>
            <span id="result-white" class="score-value">0</span>
          </div>
        </div>
        <button id="rematch-btn">もう一度遊ぶ</button>
      </div>
    </div>

    <script src="./JS/functionBoard.js"></script>
    <script src="./JS/functionStone.js"></script>
    <script src="./JS/functionGameFlow.js"></script>
    <script src="./JS/functionCpuFlow.js"></script>
    <script src="./JS/UI.js"></script>
    <script src="./JS/script.js"></script>
  </body>
</html>
